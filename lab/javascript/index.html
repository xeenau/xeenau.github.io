<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xeenau · lab · javascript</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050507;
    --surface: rgba(255,255,255,0.03);
    --surface-hover: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(246,224,94,0.4);
    --text: #f0f4ff;
    --text-dim: #6b7a99;
    --text-muted: #3a4560;
    --yellow: #f6e05e;
    --yellow-glow: rgba(246,224,94,0.15);
    --green: #68d391;
    --green-glow: rgba(104,211,145,0.15);
    --red: #fc8181;
    --sans: 'Space Grotesk', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .orb-1 { width: 500px; height: 500px; background: rgba(246,224,94,0.04); top: -200px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: rgba(159,122,234,0.05); bottom: 0; right: -100px; }
  .orb-3 { width: 300px; height: 300px; background: rgba(104,211,145,0.04); top: 40%; left: 40%; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 0 48px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(5,5,7,0.8);
    backdrop-filter: blur(20px);
  }

  .logo { font-family: var(--mono); font-size: 15px; font-weight: 600; color: var(--text); text-decoration: none; letter-spacing: -0.5px; }
  .logo span { color: var(--text-muted); }

  .nav-right { display: flex; align-items: center; gap: 16px; }

  .status-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-family: var(--mono); color: var(--green);
    padding: 6px 12px;
    background: rgba(104,211,145,0.06);
    border: 1px solid rgba(104,211,145,0.15);
    border-radius: 100px;
  }

  .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  main {
    position: relative; z-index: 1;
    max-width: 900px; margin: 0 auto;
    padding: 80px 40px 40px;
  }

  .hero { padding: 60px 0 40px; }

  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--yellow);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;
    padding: 6px 14px;
    background: rgba(246,224,94,0.06); border: 1px solid rgba(246,224,94,0.15);
    border-radius: 100px;
  }

  .hero h1 {
    font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 700;
    line-height: 1.15; letter-spacing: -1.5px; margin-bottom: 12px;
    background: linear-gradient(135deg, #f0f4ff 0%, #8bafd4 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .hero p { font-size: 14px; color: var(--text-dim); line-height: 1.75; }

  .lab-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 32px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .panel-title {
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    letter-spacing: 1px; text-transform: uppercase;
  }

  .panel-dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-red { background: #fc8181; }
  .dot-yellow { background: #f6e05e; }
  .dot-green { background: #68d391; }
  .panel-dots { display: flex; gap: 5px; }

  textarea {
    width: 100%;
    height: 320px;
    background: transparent;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    color: var(--text);
    padding: 16px;
    tab-size: 4;
  }

  textarea::placeholder { color: var(--text-muted); }

  .output-area {
    height: 320px;
    overflow-y: auto;
    padding: 16px;
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.8;
    color: var(--green);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .output-area.error { color: var(--red); }

  .output-placeholder {
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
  }

  .btn-wrap {
    display: flex; align-items: center; gap: 10px;
    margin-top: 12px;
  }

  .btn-run {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    color: #050507;
    background: var(--yellow);
    border: none; border-radius: 8px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-run:hover { background: #faf089; transform: translateY(-1px); box-shadow: 0 4px 20px var(--yellow-glow); }

  .btn-clear {
    font-family: var(--mono); font-size: 12px;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-clear:hover { color: var(--text); border-color: var(--border-hover); }

  .examples { margin-top: 32px; }

  .section-label {
    font-family: var(--mono); font-size: 10px; color: var(--text-muted);
    letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px;
    display: flex; align-items: center; gap: 12px;
  }

  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .examples-grid { display: flex; flex-wrap: wrap; gap: 8px; }

  .example-chip {
    font-family: var(--mono); font-size: 11px;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .example-chip:hover {
    border-color: var(--border-hover);
    color: var(--text);
    background: var(--yellow-glow);
  }

  @media (max-width: 700px) {
    nav { padding: 0 20px; }
    main { padding: 80px 20px 40px; }
    .lab-wrap { grid-template-columns: 1fr; }
    textarea, .output-area { height: 220px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<nav>
  <a href="/" class="logo">xeenau<span>.github.io</span></a>
  <div class="nav-right">
    <div class="status-badge"><div class="dot"></div>lab · beta</div>
  </div>
</nav>

<main>
  <div class="hero">
    <div class="hero-eyebrow">// javascript playground</div>
    <h1>tulis, run, lihat output.</h1>
    <p>practice langsung di browser — tidak perlu install apapun.</p>
  </div>

  <div class="lab-wrap">
    <!-- EDITOR -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-dots">
          <div class="panel-dot dot-red"></div>
          <div class="panel-dot dot-yellow"></div>
          <div class="panel-dot dot-green"></div>
        </div>
        <div class="panel-title">main.js</div>
        <div style="width:48px"></div>
      </div>
      <textarea id="editor" spellcheck="false" placeholder="// tulis code JavaScript di sini...

console.log('Hello, World!')"></textarea>
    </div>

    <!-- OUTPUT -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-dots">
          <div class="panel-dot dot-red"></div>
          <div class="panel-dot dot-yellow"></div>
          <div class="panel-dot dot-green"></div>
        </div>
        <div class="panel-title">output</div>
        <div style="width:48px"></div>
      </div>
      <div class="output-area" id="output">
        <span class="output-placeholder">// output akan muncul di sini</span>
      </div>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="btn-run" onclick="runCode()">▶ run</button>
    <button class="btn-clear" onclick="clearOutput()">clear</button>
  </div>

  <!-- EXAMPLES -->
  <div class="examples">
    <div class="section-label">contoh</div>
    <div class="examples-grid">
      <div class="example-chip" onclick="loadExample('hello')">hello world</div>
      <div class="example-chip" onclick="loadExample('variable')">variable & data type</div>
      <div class="example-chip" onclick="loadExample('condition')">condition</div>
      <div class="example-chip" onclick="loadExample('loop')">loop</div>
      <div class="example-chip" onclick="loadExample('function')">function</div>
      <div class="example-chip" onclick="loadExample('array')">array</div>
    </div>
  </div>
</main>

<script>
  const examples = {
    hello: `// coba ganti teks di dalam tanda kutip!
console.log("Hello, World!")
console.log("siapa namamu?")`,

    variable: `// variable & data type
// coba ganti nilai di bawah ini!

let nama = "xeenau"      // ← ganti dengan nama kamu
let umur = 20             // ← ganti dengan umur kamu
let tinggi = 170.5        // ← ganti dengan tinggi kamu
let aktif = true          // ← true atau false

console.log("nama :", nama)
console.log("umur :", umur)
console.log("tinggi :", tinggi)
console.log("aktif :", aktif)

console.log("")
console.log("tipe nama :", typeof nama)
console.log("tipe umur :", typeof umur)
console.log("tipe tinggi :", typeof tinggi)
console.log("tipe aktif :", typeof aktif)`,

    condition: `// condition — coba ganti angka umurnya!

let umur = 20    // ← coba ganti ke 15, 10, 25

if (umur >= 17) {
  console.log("boleh masuk")
} else if (umur >= 13) {
  console.log("remaja")
} else {
  console.log("belum cukup umur")
}`,

    loop: `// loop — coba ganti angka di range!

for (let i = 0; i < 5; i++) {    // ← coba ganti 5 ke 3 atau 10
  console.log("iterasi ke-", i)
}

console.log("---")

// coba ganti isi array!
let buah = ["apel", "mangga", "jeruk"]    // ← tambah atau ganti buah
for (let b of buah) {
  console.log("buah:", b)
}`,

    function: `// function — coba panggil dengan nama kamu!

function sapa(nama) {
  return "halo, " + nama + "!"
}

function tambah(a, b) {
  return a + b
}

console.log(sapa("xeenau"))    // ← ganti dengan nama kamu
console.log(sapa("bro"))
console.log("2 + 3 =", tambah(2, 3))    // ← coba ganti angkanya`,

    array: `// array — coba tambah atau ganti isinya!

let angka = [1, 2, 3, 4, 5]    // ← coba ganti atau tambah angka

console.log("array:", angka)
console.log("panjang:", angka.length)
console.log("pertama:", angka[0])
console.log("terakhir:", angka[angka.length - 1])

angka.push(6)    // ← coba ganti 6 ke angka lain
console.log("setelah push:", angka)

let total = angka.reduce((a, b) => a + b, 0)
console.log("total:", total)`
  };

  function loadExample(key) {
    document.getElementById('editor').value = examples[key];
  }

  function runCode() {
    const code = document.getElementById('editor').value;
    const output = document.getElementById('output');

    output.className = 'output-area';
    output.textContent = '';

    const logs = [];

    // override console.log
    const originalLog = console.log;
    console.log = (...args) => {
      logs.push(args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' '));
    };

    try {
      eval(code);
      console.log = originalLog;
      output.innerText = logs.length > 0 ? logs.join('\n') : '// code berjalan tanpa output';
    } catch (err) {
      console.log = originalLog;
      output.className = 'output-area error';
      output.textContent = '❌ ' + err.message;
    }
  }

  function clearOutput() {
    const output = document.getElementById('output');
    output.className = 'output-area';
    output.innerHTML = '<span class="output-placeholder">// output akan muncul di sini</span>';
  }

  // keyboard shortcut Ctrl+Enter to run
  document.getElementById('editor').addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') runCode();
    if (e.key === 'Tab') {
      e.preventDefault();
      const ta = e.target;
      const start = ta.selectionStart;
      ta.value = ta.value.substring(0, start) + '    ' + ta.value.substring(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = start + 4;
    }
  });
</script>
</body>
</html>
